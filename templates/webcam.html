<!doctype html>
<html lang="en">
<head>
    <link rel="icon" href="https://cdn.pixabay.com/photo/2021/03/23/09/01/webcam-6116845_1280.png" type="image/x-icon">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Live Detection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #100a1c;
            background-image:
                radial-gradient(50% 30% ellipse at center top, #201e40 0%, rgba(0,0,0,0) 100%),
                radial-gradient(60% 50% ellipse at center bottom, #261226 0%, #100a1c 100%);
            background-attachment: fixed;
            color: #6cacc5;
            font-family: 'Inter', sans-serif;
            height: 100%;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            gap: 16px;
        }
        h2 {
            text-align: center;
            flex: 1;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 8px rgba(108,172,197,0.4);
        }
        button {
            border: 1px solid rgba(108,172,197,0.3);
            background: rgba(42,50,113,.28);
            color: #6cacc5;
            cursor: pointer;
            font: inherit;
            padding: 6px 14px;
            transition: all 0.3s;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        button:hover { background: #201e40; border-color: #6cacc5; }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px 20px;
            gap: 16px;
        }
        .video-wrap {
            position: relative;
            width: min(90vw, 800px);
            border: 2px solid rgba(108,172,197,0.4);
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(108,172,197,0.1);
        }
        #localVideo {
            width: 100%;
            display: block;
        }
        #outputCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        .status-bar {
            width: min(90vw, 800px);
            background: rgba(42,50,113,.28);
            border: 1px solid rgba(108,172,197,0.2);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.85rem;
            color: #8ab8cc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .dot.active { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
        .dot.error  { background: #f44336; box-shadow: 0 0 6px #f44336; }
        .controls {
            display: flex; gap: 10px;
        }
        #startBtn  { background: rgba(76,175,80,0.2);  border-color: rgba(76,175,80,0.5); }
        #startBtn:hover  { background: rgba(76,175,80,0.4); }
        #stopBtn   { background: rgba(244,67,54,0.2); border-color: rgba(244,67,54,0.5); }
        #stopBtn:hover   { background: rgba(244,67,54,0.4); }
        #stopBtn:disabled, #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/"><button>← Home</button></a>
        <h2>Live Age &amp; Gender Detection</h2>
    </div>

    <div class="container">
        <div class="video-wrap">
            <video id="localVideo" autoplay playsinline muted></video>
            <canvas id="outputCanvas"></canvas>
        </div>

        <div class="status-bar">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Camera not started. Click "Start Camera".</span>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startCamera()">▶ Start Camera</button>
            <button id="stopBtn"  onclick="stopCamera()" disabled>■ Stop Camera</button>
        </div>
    </div>

    <canvas id="captureCanvas" style="display:none;"></canvas>

    <script>
        const video       = document.getElementById('localVideo');
        const outCanvas   = document.getElementById('outputCanvas');
        const capCanvas   = document.getElementById('captureCanvas');
        const statusDot   = document.getElementById('statusDot');
        const statusText  = document.getElementById('statusText');
        const startBtn    = document.getElementById('startBtn');
        const stopBtn     = document.getElementById('stopBtn');
        const outCtx      = outCanvas.getContext('2d');
        const capCtx      = capCanvas.getContext('2d');

        let stream = null;
        let processing = false;
        let running = false;

        async function startCamera() {
            try {
                setStatus('Requesting camera access…', 'inactive');
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                await video.play();
                running = true;
                startBtn.disabled = true;
                stopBtn.disabled  = false;
                setStatus('Camera active — detecting…', 'active');
                processLoop();
            } catch (err) {
                setStatus('Camera error: ' + err.message, 'error');
            }
        }

        function stopCamera() {
            running = false;
            if (stream) stream.getTracks().forEach(t => t.stop());
            stream = null;
            video.srcObject = null;
            outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
            startBtn.disabled = false;
            stopBtn.disabled  = true;
            setStatus('Camera stopped.', 'inactive');
        }

        async function processLoop() {
            if (!running) return;
            if (!processing && video.readyState === 4) {
                processing = true;
                try {
                    // Sync canvas sizes to video
                    const w = video.videoWidth, h = video.videoHeight;
                    capCanvas.width  = w; capCanvas.height = h;
                    outCanvas.width  = video.offsetWidth;
                    outCanvas.height = video.offsetHeight;

                    capCtx.drawImage(video, 0, 0, w, h);
                    const dataURL = capCanvas.toDataURL('image/jpeg', 0.8);

                    const resp = await fetch('/process_frame', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: dataURL })
                    });

                    if (resp.ok) {
                        const blob = await resp.blob();
                        const imgURL = URL.createObjectURL(blob);
                        const img = new Image();
                        img.onload = () => {
                            outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
                            outCtx.drawImage(img, 0, 0, outCanvas.width, outCanvas.height);
                            URL.revokeObjectURL(imgURL);
                        };
                        img.src = imgURL;
                    }
                } catch (e) {
                    setStatus('Processing error: ' + e.message, 'error');
                } finally {
                    processing = false;
                }
            }
            setTimeout(processLoop, 200); // ~5 fps to keep server manageable
        }

        function setStatus(msg, state) {
            statusText.textContent = msg;
            statusDot.className = 'dot' + (state === 'active' ? ' active' : state === 'error' ? ' error' : '');
        }
    </script>
</body>
</html>
